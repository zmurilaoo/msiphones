<style>
  :root {
    --msi-black: #000000;
    --msi-night: #0a0a0c;
    --msi-coal: #111114;
    --msi-graphite: #1a1a1f;
    --msi-stone: #2a2a31;
    --msi-fog: #6b6b75;
    --msi-mist: #b8b8c2;
    --msi-snow: #f5f5f7;
    --msi-white: #ffffff;
    --msi-red: #FF0020;
    --msi-red-bright: #FF3344;
    --msi-red-deep: #cc0018;
    --msi-red-glow: rgba(255, 0, 32, 0.35);
    --msi-card: #ffffff;
    --msi-card-ink: #1d1d1f;
    --msi-card-mute: #86868b;
    --msi-card-line: #e5e5ea;
    --font-display: 'Sora', system-ui, sans-serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    --shadow-card: 0 30px 60px -20px rgba(0,0,0,0.45), 0 12px 24px -12px rgba(0,0,0,0.25);
    --shadow-card-hover: 0 50px 90px -25px rgba(0,0,0,0.6), 0 20px 40px -15px rgba(0,0,0,0.35);
    --shadow-glow: 0 0 60px var(--msi-red-glow);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #ffffff;
    color: var(--msi-card-ink);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  h1, h2, h3, h4, h5 { font-family: var(--font-display); font-weight: 700; letter-spacing: -0.02em; margin: 0; }
  button { font-family: inherit; cursor: pointer; }
  a { color: inherit; text-decoration: none; }

  .msi-grid-bg {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(227,0,19,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(227,0,19,0.07) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  }
  .msi-grid-bg-light {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.10) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.10) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  }

  .msi-beam { position: absolute; pointer-events: none; filter: blur(80px); opacity: 0.55; }
  .msi-reveal { opacity: 0; transform: translateY(40px); }
  ::selection { background: var(--msi-red); color: white; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: #f5f5f7; }
  ::-webkit-scrollbar-thumb { background: #d8d8e0; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--msi-red); }
  .msi-container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
  @media (max-width: 720px) { .msi-container { padding: 0 20px; } }
  #root { min-height: 100vh; }
  .w-wrap { display: inline-block; overflow: hidden; vertical-align: bottom; }
  .w-wrap > span { display: inline-block; }

  @keyframes msi-float-a {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33%       { transform: translate(14px, -20px) rotate(2deg); }
    66%       { transform: translate(-10px, 10px) rotate(-1.5deg); }
  }
  @keyframes msi-float-b {
    0%, 100% { transform: translate(0, 0); }
    50%       { transform: translate(-18px, -28px); }
  }
  @keyframes msi-spin-slow {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes msi-glow-pulse {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50%       { opacity: 0.7; transform: scale(1.25); }
  }
  @keyframes msi-shimmer {
    0%   { opacity: 0.6; }
    50%  { opacity: 1; }
    100% { opacity: 0.6; }
  }
  @keyframes msi-bar-fill { from { width: 0; } }
  .anim-bar { animation: msi-bar-fill 1.2s cubic-bezier(.22,1,.36,1) forwards; }

  .msi-toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--msi-card-ink); color: #fff;
    padding: 14px 22px; border-radius: 100px; font-weight: 600;
    font-size: 14px; box-shadow: var(--shadow-card);
    z-index: 9999; display: flex; align-items: center; gap: 10px;
  }
</style>

<script>
(function () {
  'use strict';

  /* Bloqueia menu de contexto (botão direito) */
  document.addEventListener('contextmenu', function (e) {
    e.preventDefault();
    return false;
  }, true);

  /* Bloqueia atalhos de teclado de inspeção */
  document.addEventListener('keydown', function (e) {
    var k = e.key;
    /* F12 */
    if (k === 'F12') { e.preventDefault(); e.stopPropagation(); return false; }
    /* Ctrl/Cmd + Shift + I/J/C/K */
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && ['I','J','C','K'].indexOf(k.toUpperCase()) !== -1) {
      e.preventDefault(); e.stopPropagation(); return false;
    }
    /* Ctrl + U (ver código fonte) */
    if ((e.ctrlKey || e.metaKey) && k.toLowerCase() === 'u') {
      e.preventDefault(); return false;
    }
    /* Ctrl + S (salvar página) */
    if ((e.ctrlKey || e.metaKey) && k.toLowerCase() === 's') {
      e.preventDefault(); return false;
    }
  }, true);

  /* Aviso no console */
  var _c = window.console;
  if (_c) {
    setTimeout(function () {
      _c.clear && _c.clear();
      _c.log && _c.log(
        '%c⛔ ATENÇÃO',
        'color:#FF0020;font-size:32px;font-weight:900;'
      );
      _c.log && _c.log(
        '%cEste é um recurso para desenvolvedores.\nSe alguém pediu para você colar algo aqui, pode ser uma tentativa de fraude.\nNão execute comandos desconhecidos.',
        'font-size:14px;color:#333;line-height:1.6;'
      );
    }, 800);
  }
})();
</script>
